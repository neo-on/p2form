name: Enterprise Deploy to VPS
on:
  push:
    branches:
      - main # Deploys automatically when you push to the 'main' branch

jobs:
  validate:
    name: 🧪 Analyze Code Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Modify this if your VPS runs a different Node version
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate Server Code (Syntax)
        run: node -c server.js
        
      - name: Execute Full Test Suite
        run: npm test -- --ci
        
  deploy:
    name: 🚀 Zero-Downtime Deploy
    needs: validate # CRITICAL: This explicitly forces this job to only run if 'validate' had 0 errors
    runs-on: ubuntu-latest
    steps:
      - name: Execute remote ssh commands using password
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e # Halt immediately if any command fails
            
            echo "=== 🚀 Starting production deployment ==="
            cd /root/p2form
            
            echo "[1/4] 📦 Pulling latest code from GitHub..."
            if [ -d ".git" ]; then
              git fetch --all
              git reset --hard origin/main
            else
              echo "⚠️ WARNING: /root/p2form is not a Git repository!"
              echo "To fix this, log into your VPS and run: git clone <your-repo-url> /root/p2form"
              exit 1
            fi
            
            echo "[2/4] 🧩 Installing dependencies cleanly..."
            npm ci --only=production
            
            echo "[3/4] 🔄 Executing Zero-Downtime PM2 Reload..."
            # startOrReload naturally falls back to starting the app if it doesn't currently exist!
            pm2 startOrReload ecosystem.config.js --env production --update-env
            pm2 save
            
            echo "[4/4] 🩺 Performing Live Health Check..."
            echo "Waiting 5 seconds for PM2 and Node to naturally spin up..."
            sleep 5
            
            # Curl exactly the local port to verify the HTTP server is serving 2XX status codes
            if curl -s -f http://localhost:3000 > /dev/null; then
              echo "✅ Health check passed! The node application is actively serving traffic on port 3000."
            else
              echo "❌ Health check failed OR internal server error occurred! Please check PM2 logs immediately."
              pm2 logs p2-form-app --lines 20 --nostream
              exit 1
            fi
            
            echo "=== ✅ Enterprise Deployment highly successful! ==="
