name: Enterprise PR Validation

on:
  pull_request:
    branches:
      - main
    # Ensure it triggers on PR creation, editing, and new commits
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write # Explicitly required to automatically comment on the PR directly
  contents: read

jobs:
  validate-pr:
    name: 🛡️ Strict Pull Request Audits
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Architecture
        run: npm ci

      - name: 🔍 NPM Security Audit
        # Routes the output visually into the GitHub UI Summary
        run: |
          echo "## 🛡️ NPM Audit Results" >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=high >> $GITHUB_STEP_SUMMARY || { echo "❌ Critical Vulnerabilities Found!"; exit 1; }
          echo "✅ Security checks passed cleanly." >> $GITHUB_STEP_SUMMARY

      - name: 📜 Core Syntax Hardening
        run: node -c server.js

      - name: 📊 Executing Strict Coverage Analytics & PR Commenting
        # This professional action runs Jest, compiles the coverage, and natively posts a 
        # gorgeous sticky comment on your actual Pull Request showing you the math exactly!
        # It natively fails the workflow if any test fails!
        uses: ArtiomTr/jest-coverage-report-action@v2
        with:
          test-script: npm run test
          annotations: failed-tests
          output: report-markdown

      - name: ❌ Handle Failure Fallback
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚨 **Pull Request Validation Failed!** The automated tests, security audits, or syntax mapping failed. Fix the errors shown in the Action logs and push a new commit to automatically retry.'
            })

      - name: ✅ Handle Clean Success
        if: success()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **All Enterprise Checks Passed!** Security audits are clean. The JSON endpoints evaluated flawlessly. You are cleanly approved to execute the Merge!'
            })
