name: PR Validation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

# Cancel in-flight runs for the same PR — saves runner minutes
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: read
  checks: write

jobs:
  validate-pr:
    name: 🛡️ Validate Pull Request
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔍 Security Audit (production)
        run: |
          echo "## 🛡️ NPM Audit Results" >> $GITHUB_STEP_SUMMARY
          npm audit --omit=dev --audit-level=high >> $GITHUB_STEP_SUMMARY 2>&1 || {
            echo "❌ High/Critical vulnerabilities found in production dependencies!" >> $GITHUB_STEP_SUMMARY
            exit 1
          }
          echo "✅ No high/critical vulnerabilities." >> $GITHUB_STEP_SUMMARY

      - name: 📜 Syntax Validation (all source files)
        run: |
          echo "## 📜 Syntax Validation" >> $GITHUB_STEP_SUMMARY
          errors=0
          for f in server.js routes/*.js models/*.js middleware/*.js utils/*.js config/*.js; do
            if ! node -c "$f" 2>/dev/null; then
              echo "❌ Syntax error in $f" >> $GITHUB_STEP_SUMMARY
              errors=1
            fi
          done
          if [ "$errors" -eq 0 ]; then
            echo "✅ All source files compiled without syntax errors." >> $GITHUB_STEP_SUMMARY
          else
            exit 1
          fi

      - name: 🧪 Run Test Suite with Coverage
        run: |
          echo "## 🧪 Test Suite Results" >> $GITHUB_STEP_SUMMARY
          npm test -- --ci --verbose 2>&1 | tee test-output.txt
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -25 test-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: 📤 Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-output.txt
            coverage/
          retention-days: 14

      - name: 📊 Post Validation Report to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let testOutput = '';
            try {
              testOutput = fs.readFileSync('test-output.txt', 'utf8');
            } catch (e) {
              testOutput = 'Could not read test output.';
            }

            const lines = testOutput.split('\n');
            const coverageStart = lines.findIndex(l => l.includes('----------|'));
            let coverageBlock = '';
            if (coverageStart !== -1) {
              coverageBlock = lines.slice(coverageStart - 1).join('\n');
            }

            const passed = lines.some(l => l.includes('Tests:') && l.includes('passed'));
            const failed = lines.some(l => l.includes('Tests:') && l.includes('failed'));

            const suiteLine = lines.find(l => l.includes('Test Suites:')) || '';
            const testLine = lines.find(l => l.includes('Tests:')) || '';
            const timeLine = lines.find(l => l.includes('Time:')) || '';

            let status = failed ? '🚨 FAILED' : '✅ PASSED';
            let emoji = failed ? '❌' : '✅';

            let body = `## ${emoji} PR Validation Report\n\n`;
            body += `**Status:** ${status}\n\n`;
            body += `| Metric | Result |\n|--------|--------|\n`;
            body += `| ${suiteLine.replace(/\s+/g, ' ').trim()} ||\n`;
            body += `| ${testLine.replace(/\s+/g, ' ').trim()} ||\n`;
            body += `| ${timeLine.replace(/\s+/g, ' ').trim()} ||\n\n`;

            if (coverageBlock) {
              body += `### 📊 Code Coverage\n\`\`\`\n${coverageBlock}\n\`\`\`\n`;
            }

            if (failed) {
              body += `\n> 🚨 **Fix the failing tests and push a new commit to retry.**\n`;
            } else {
              body += `\n> ✅ **All checks passed. This PR is safe to merge!**\n`;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
