name: Enterprise PR Validation

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read
  checks: write

jobs:
  validate-pr:
    name: 🛡️ Strict Pull Request Audits
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔍 NPM Security Audit
        run: |
          echo "## 🛡️ NPM Audit Results" >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=high >> $GITHUB_STEP_SUMMARY 2>&1 || { echo "❌ Critical Vulnerabilities Found!" >> $GITHUB_STEP_SUMMARY; exit 1; }
          echo "✅ Security checks passed cleanly." >> $GITHUB_STEP_SUMMARY

      - name: 📜 Core Syntax Validation
        run: |
          echo "## 📜 Syntax Validation" >> $GITHUB_STEP_SUMMARY
          node -c server.js
          echo "✅ server.js compiled without syntax errors." >> $GITHUB_STEP_SUMMARY

      - name: 🧪 Execute Test Suite with Coverage
        run: |
          echo "## 🧪 Test Suite Results" >> $GITHUB_STEP_SUMMARY
          npm test -- --ci --verbose 2>&1 | tee test-output.txt
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -20 test-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: 📊 Post Coverage Report to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let testOutput = '';
            try {
              testOutput = fs.readFileSync('test-output.txt', 'utf8');
            } catch (e) {
              testOutput = 'Could not read test output.';
            }

            // Extract the coverage table (last 20 lines typically contain it)
            const lines = testOutput.split('\n');
            const coverageStart = lines.findIndex(l => l.includes('----------|'));
            let coverageBlock = '';
            if (coverageStart !== -1) {
              coverageBlock = lines.slice(coverageStart - 1).join('\n');
            }

            const passed = lines.some(l => l.includes('Tests:') && l.includes('passed'));
            const failed = lines.some(l => l.includes('Tests:') && l.includes('failed'));

            // Build summary counts
            const suiteLine = lines.find(l => l.includes('Test Suites:')) || '';
            const testLine = lines.find(l => l.includes('Tests:')) || '';
            const timeLine = lines.find(l => l.includes('Time:')) || '';

            let status = failed ? '🚨 FAILED' : '✅ PASSED';
            let emoji = failed ? '❌' : '✅';

            let body = `## ${emoji} PR Validation Report\n\n`;
            body += `**Status:** ${status}\n\n`;
            body += `| Metric | Result |\n|--------|--------|\n`;
            body += `| ${suiteLine.replace(/\s+/g, ' ').trim()} ||\n`;
            body += `| ${testLine.replace(/\s+/g, ' ').trim()} ||\n`;
            body += `| ${timeLine.replace(/\s+/g, ' ').trim()} ||\n\n`;

            if (coverageBlock) {
              body += `### 📊 Code Coverage\n\`\`\`\n${coverageBlock}\n\`\`\`\n`;
            }

            if (failed) {
              body += `\n> 🚨 **Fix the failing tests and push a new commit to retry.**\n`;
            } else {
              body += `\n> ✅ **All checks passed. This PR is safe to merge!**\n`;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
