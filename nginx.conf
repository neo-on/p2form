# ============================================
# Nginx Reverse Proxy Config for P2 Form App
# Copy to: /etc/nginx/sites-available/p2form
# Then: sudo ln -s /etc/nginx/sites-available/p2form /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx
# ============================================

server {
    listen 80;
    server_name yourdomain.com;  # Replace with your domain or IP

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# After setting up, install SSL:
# sudo apt install certbot python3-certbot-nginx
# sudo certbot --nginx -d yourdomain.com
