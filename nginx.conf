# ============================================
# Nginx Reverse Proxy Config for P2 Form App
# Copy to: /etc/nginx/sites-available/p2form
# Then: sudo ln -s /etc/nginx/sites-available/p2form /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx
# ============================================

# Rate limiting — protects tiny droplet from abuse
limit_req_zone $binary_remote_addr zone=app_limit:5m rate=10r/s;

server {
    listen 80;
    server_name yourdomain.com;  # Replace with your domain or IP

    client_max_body_size 10m;

    # Security headers (defense-in-depth alongside Helmet)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip — saves bandwidth on a small droplet
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 4;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Static assets — served by Nginx directly, takes load off Node
    location /css/ {
        alias /root/p2form/public/css/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /js/ {
        alias /root/p2form/public/js/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Application proxy
    location / {
        limit_req zone=app_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Block dotfiles (.env, .git, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# After setting up, install SSL:
# sudo apt install certbot python3-certbot-nginx
# sudo certbot --nginx -d yourdomain.com
